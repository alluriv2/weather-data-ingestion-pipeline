<!DOCTYPE html>
<html>
<head>
    <title>Weather Dashboard</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background:#f5f7fa;
            margin:0;
            padding:0;
            text-align:center;
            color:#333;
        }

        h1 {
            margin-top:40px;
            font-size:40px;
            font-weight:700;
        }

        p.subtitle {
            margin-top:-10px;
            color:#666;
            font-size:18px;
        }

        .section-title {
            margin-top:50px;
            font-size:26px;
            font-weight:600;
        }

        .button-row {
            display:flex;
            justify-content:center;
            gap:40px;
            flex-wrap:wrap;
            margin-top:25px;
        }

        .card-btn {
            background:white;
            border-radius:12px;
            padding:16px 28px;
            font-size:20px;
            border:2px solid #eee;
            min-width:220px;
            cursor:pointer;
            box-shadow:0 3px 10px rgba(0,0,0,0.06);
            transition:0.2s;
        }

        .card-btn:hover {
            transform:translateY(-3px);
            box-shadow:0 6px 16px rgba(0,0,0,0.12);
        }

        .selected {
            border-color:#007bff !important;
            box-shadow:0 6px 16px rgba(0,123,255,0.2) !important;
        }

        .load-btn {
            background:#007bff;
            color:white;
            padding:15px 50px;
            border-radius:10px;
            font-size:22px;
            border:none;
            cursor:pointer;
            margin-top:40px;
            box-shadow:0 4px 14px rgba(0,0,0,0.12);
            transition:0.2s;
        }

        .load-btn:hover {
            background:#006ae6;
            transform:scale(1.03);
        }
    </style>
</head>

<body>

<h1>Weather Dashboard</h1>
<p class="subtitle">Select a metric and a time range to generate the dashboard.</p>


<!-- ======================= METRIC ROW ======================= -->
<div class="section-title">Metric</div>

<div class="button-row">
    <div class="card-btn metric-btn" data-value="temperature">🌡️ Temperature</div>
    <div class="card-btn metric-btn" data-value="wind_speed">🌬️ Wind Speed</div>
    <div class="card-btn metric-btn" data-value="wind_direction">🧭 Wind Direction</div>
    <div class="card-btn metric-btn" data-value="lux">☀️ Light Level</div>
    <div class="card-btn metric-btn" data-value="rain_inches">🌧️ Rainfall</div>
</div>


<!-- ======================= RANGE ROW ======================= -->
<div class="section-title">Range</div>

<div class="button-row">
    <div class="card-btn range-btn" data-value="day">24 Hours</div>
    <div class="card-btn range-btn" data-value="week">1 Week</div>
    <div class="card-btn range-btn" data-value="month">1 Month</div>
    <div class="card-btn range-btn" data-value="year">1 Year</div>
</div>


<!-- ======================= LOAD BUTTON ======================= -->
<button class="load-btn" onclick="loadDashboard()">Load Dashboard</button>


<script>
let selectedMetric = null;
let selectedRange = null;

document.querySelectorAll(".metric-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".metric-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedMetric = btn.dataset.value;
    });
});

document.querySelectorAll(".range-btn").forEach(btn => {
    btn.addEventListener("click", () => {
        document.querySelectorAll(".range-btn").forEach(b => b.classList.remove("selected"));
        btn.classList.add("selected");
        selectedRange = btn.dataset.value;
    });
});

function loadDashboard() {
    if (!selectedMetric || !selectedRange) {
        alert("Please select both a metric and a time range.");
        return;
    }
    window.location.href = `/dashboard/${selectedMetric}/${selectedRange}`;
}
</script>

</body>
</html>
